services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nginx-app:local
    container_name: nginx-app
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
