name: CI/CD Pipeline

# Quando o pipeline vai rodar
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
# ══════════════════════════
# JOB 1 — Build e Push
# ══════════════════════════
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest   # máquina virtual que o GitHub fornece
    environment: dockerhub

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Login no Docker Hub usando os secrets que você cadastrou
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Configura o buildx (builder moderno do Docker)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Gera as tags da imagem automaticamente
      #    ex: seu-usuario/nginx-color-app:main-a1b2c3d
      - name: Gerar metadados e tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-env
          tags: |
            type=sha,prefix={{branch}}-        # branch-sha curto
            type=raw,value=latest,enable={{is_default_branch}}

      # 5. Faz o build e já sobe para o Docker Hub
      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ github.run_id }}
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha    # cache entre runs — acelera o build
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy em Produção
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'   # só na branch main
    environment: dockerhub               # aparece no GitHub como environment

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nginx-env:latest

            docker stop nginx-env 2>/dev/null || true
            docker rm   nginx-env 2>/dev/null || true

            docker run -d \
              --name nginx-color-app \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/nginx-env:latest

            sleep 3
            curl -f http://localhost/ && echo "Deploy OK!"
